<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Landing Page/style.css" />
    <title>Landing Page</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#about">About me</a></li>
          <li><a href="#skills">Skills</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="about">
        <h1>
          Hello everyone! <br />
          I am glad to see you on my Landing Page! <br />
          Here you can find information about me.
        </h1>
        <img
          src="https://placehold.co/600x400"
          alt="Avatar"
          class="avatar-img"
        />
        <button>Contact me</button>
      </section>
      <section id="skills">
        <h2>Here you can read my technical skills.</h2>
        <div class="card-grid">
          <div class="card html5">
            <div class="card-info">
              <h3>HTML</h3>
            </div>
          </div>
          <div class="card css">
            <div class="card-info">
              <h3>CSS</h3>
            </div>
          </div>
          <div class="card javascript">
            <div class="card-info">
              <h3>JavaScript</h3>
            </div>
          </div>
          <div class="card git">
            <div class="card-info">
              <h3><span style="color: rgb(240, 80, 48)">Git</span> & GitHub</h3>
            </div>
          </div>
        </div>
      </section>
      <section id="projects"></section>
      <section id="contact"></section>
    </main>
  </body>
</html>
